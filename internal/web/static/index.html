<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DayZ Server Manager</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <div id="first-run" class="modal hidden">
    <div class="modal-card">
      <h2 data-i18n="firstRun.title"></h2>

      <label data-i18n="firstRun.lang"></label>
      <select id="fr-lang">
        <option value="en">English</option>
        <option value="ru">Русский</option>
      </select>

      <label data-i18n="firstRun.vanillaPath"></label>
      <div class="row" style="gap:6px;">
        <input id="fr-vanilla" type="text" placeholder="F:\SteamLibrary\steamapps\common\DayZ" style="flex:1;" />
        <button type="button" id="fr-steam" class="secondary" data-i18n="firstRun.detect"></button>
      </div>
      <small class="hint" data-i18n="firstRun.vanillaPath.hint"></small>
      <div id="fr-steam-list" class="steam-list hidden"></div>
      <div id="fr-missions" class="missions-preview hidden"></div>

      <label data-i18n="firstRun.exposure"></label>
      <div class="row">
        <label><input type="radio" name="fr-exposure" value="local" checked /> <span data-i18n="firstRun.exposure.local"></span></label>
        <label><input type="radio" name="fr-exposure" value="internet" /> <span data-i18n="firstRun.exposure.internet"></span></label>
      </div>

      <div id="fr-auth-block">
        <label data-i18n="firstRun.adminUsername"></label>
        <input id="fr-admin-user" type="text" value="admin" autocomplete="username" />
        <label data-i18n="firstRun.adminPassword"></label>
        <input id="fr-admin-pass" type="password" autocomplete="new-password" />
        <small class="hint" data-i18n="firstRun.adminPassword.hint"></small>
      </div>

      <div class="actions">
        <button id="fr-finish" class="primary" data-i18n="firstRun.finish"></button>
      </div>
    </div>
  </div>

  <div id="login" class="modal hidden">
    <div class="modal-card">
      <h2 data-i18n="login.title"></h2>
      <label data-i18n="login.username"></label>
      <input id="login-user" type="text" autocomplete="username" />
      <label data-i18n="login.password"></label>
      <input id="login-pass" type="password" autocomplete="current-password" />
      <div id="login-error" class="hint" style="color:#ff6b6b;"></div>
      <div class="actions">
        <button id="login-submit" class="primary" data-i18n="login.submit"></button>
      </div>
    </div>
  </div>

  <header class="topbar">
    <div class="brand">
      <span class="logo">DZ</span>
      <div>
        <div class="title" data-i18n="app.name"></div>
        <div class="subtitle" data-i18n="app.author"></div>
      </div>
    </div>
    <nav class="nav">
      <a data-route="dashboard" class="active" data-i18n="nav.dashboard"></a>
      <span class="nav-sep"></span>
      <a data-route="server"     data-i18n="nav.server"></a>
      <a data-route="mods"       data-i18n="nav.mods"></a>
      <a data-route="events"     data-i18n="nav.events"></a>
      <span class="nav-sep"></span>
      <a data-route="types"      data-i18n="nav.types"></a>
      <a data-route="moded"      data-i18n="nav.modedTypes"></a>
      <a data-route="missiondb"  data-i18n="nav.missionDb"></a>
      <span class="nav-sep"></span>
      <a data-route="files"      data-i18n="nav.files"></a>
      <a data-route="profiles"   data-i18n="nav.profiles"></a>
      <a data-route="battleye"   data-i18n="nav.battleye"></a>
      <span class="nav-sep"></span>
      <a data-route="logs"       data-i18n="nav.logs"></a>
      <a data-route="admlog"     data-i18n="nav.admlog"></a>
      <a data-route="rcon"       data-i18n="nav.rcon"></a>
      <a data-route="validator"  data-i18n="nav.validator"></a>
      <span class="nav-sep"></span>
      <a data-route="sync"       data-i18n="nav.sync"></a>
      <a data-route="settings"   data-i18n="nav.settings"></a>
    </nav>
    <div class="top-right">
      <button id="theme-toggle" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">
        <span class="theme-icon">◐</span>
      </button>
      <select id="lang-switch">
        <option value="en">EN</option>
        <option value="ru">RU</option>
      </select>
      <span id="server-indicator" class="chip stopped">
        <span class="dot"></span>
        <span id="server-indicator-text" data-i18n="status.stopped"></span>
      </span>
      <button id="logout-btn" class="hidden" data-i18n="action.logout"></button>
    </div>
  </header>

  <main id="view"></main>

  <footer class="footer">
    <span data-i18n="app.copyright"></span>
    <span class="footer-sep">·</span>
    <a href="https://buymeacoffee.com/aristarh.ucolov" target="_blank" rel="noopener" class="donate-link">☕ <span data-i18n="support.coffee"></span></a>
    <span class="footer-sep">·</span>
    <a href="https://www.donationalerts.com/r/aristarh_ucolov" target="_blank" rel="noopener" class="donate-link">♥ <span data-i18n="support.donationalerts"></span></a>
  </footer>

  <div id="toast" class="toast"></div>

  <script src="/app.js"></script>
</body>
</html>
